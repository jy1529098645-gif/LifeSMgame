<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23232e"/>
      <stop offset="1" stop-color="#0a0a0e"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3ca"/>
      <stop offset="1" stop-color="#ffe0a0"/>
    </linearGradient>
  </defs>
  <!-- 深色圆角徽章 + 微信绿描边 -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)" stroke="#3ee07f" stroke-width="2.5"/>
  <!-- 「人」字：一撇一捺，就是人生 -->
  <g fill="none" stroke="url(#ink)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M33 15 L17 50"/>
    <path d="M30 23 L48 50"/>
  </g>
  <!-- 脚下一线绿：人生这条路 -->
  <path d="M22 55 H42" fill="none" stroke="#3ee07f" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
</svg>
